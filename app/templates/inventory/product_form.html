{% extends "base.html" %}
{% block content %}

<div class="row" style="justify-content:space-between; margin-bottom:14px;">
  <div>
    <h1 style="margin:0;">{{ title }}</h1>
    <p class="muted" style="margin:5px 0 0;">
      {% if product %}Editando: <b>{{ product.name }}</b>{% else %}Agrega un producto al inventario{% endif %}
    </p>
  </div>
  <a class="btn btn-secondary" href="{{ url_for('inventory.index') }}">← Volver</a>
</div>

<form method="post" action="{{ action_url }}" class="card" style="padding:18px;">

  <div class="cfg-grid2">

    <div style="grid-column:1/-1;">
      <label class="muted">Nombre del producto *</label>
      <input class="input" name="name" placeholder="Shampoo para auto con cera"
             value="{{ product.name if product else '' }}" required>
    </div>

    <div>
      <label class="muted">Marca (opcional)</label>
      <input class="input" name="brand" placeholder="Meguiar's, Sonax, etc."
             value="{{ product.brand if product and product.brand else '' }}">
    </div>

    <div>
      <label class="muted">Categoría</label>
      <select class="input" name="category">
        {% for key, label in categories.items() %}
          <option value="{{ key }}"
            {% if product and product.category == key %}selected
            {% elif not product and key == 'general' %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="muted">Unidad de medida</label>
      <select class="input" name="unit">
        {% for u in units %}
          <option value="{{ u }}"
            {% if product and product.unit == u %}selected{% endif %}>
            {{ u }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="muted">Costo por unidad ($)</label>
      <input class="input" type="number" name="cost" min="0" step="1"
             placeholder="0"
             value="{{ product.cost if product else '' }}">
    </div>

    <div>
      <label class="muted">Stock actual</label>
      <input class="input" type="number" name="stock" min="0" step="0.01"
             placeholder="0"
             value="{{ product.stock if product else '0' }}">
    </div>

    <div>
      <label class="muted">Stock mínimo (alerta)</label>
      <input class="input" type="number" name="stock_min" min="0" step="0.01"
             placeholder="1"
             value="{{ product.stock_min if product else '1' }}">
      <div class="muted" style="font-size:12px; margin-top:5px;">
        Se marcará en rojo cuando el stock baje de este valor.
      </div>
    </div>

    <div style="grid-column:1/-1;">
      <label class="muted">Notas (opcional)</label>
      <textarea class="input" name="notes" rows="2"
                placeholder="Dónde se compra, dilución, etc.">{{ product.notes if product and product.notes else '' }}</textarea>
    </div>

  </div>

  <!-- Preview de valor -->
  <div id="valuePreview" class="muted" style="margin-top:14px; font-size:13px;"></div>

  <div class="row" style="justify-content:flex-end; margin-top:16px; gap:8px;">
    <a class="btn btn-secondary" href="{{ url_for('inventory.index') }}">Cancelar</a>
    <button class="btn" type="submit">
      {% if product %}Guardar cambios{% else %}Crear producto{% endif %}
    </button>
  </div>
</form>

<script>
  const costInput  = document.querySelector('[name=cost]');
  const stockInput = document.querySelector('[name=stock]');
  const preview    = document.getElementById('valuePreview');

  function updatePreview() {
    const c = parseFloat(costInput.value) || 0;
    const s = parseFloat(stockInput.value) || 0;
    const val = Math.round(c * s);
    preview.textContent = val > 0
      ? `Valor en existencia: $${val} (${s} unidades × $${c})`
      : '';
  }

  costInput.addEventListener('input', updatePreview);
  stockInput.addEventListener('input', updatePreview);
  updatePreview();
</script>

<style>
.cfg-grid2 {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
@media(max-width:600px){ .cfg-grid2{ grid-template-columns:1fr; } }
</style>

{% endblock %}
