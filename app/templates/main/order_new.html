{% extends "base.html" %}
{% block content %}

<div class="row" style="justify-content:space-between; margin-bottom:10px;">
  <div>
    <h1 style="margin:0;">Nueva orden</h1>
    <p class="muted" style="margin:6px 0 0;">Captura rápida para operar al momento</p>
  </div>
  <div class="row">
    <a class="btn btn-secondary" href="{{ url_for('main.dashboard') }}">← Volver</a>
  </div>
</div>

<form class="card" method="post" style="padding:14px;" onsubmit="return validateWhatsApp10();">
  <div class="grid" style="gap:12px;">
    <div>
      <label class="muted">Nombre</label>
      <input class="input" name="name" placeholder="Cliente" required>
    </div>

    <div>
      <label class="muted">WhatsApp (10 dígitos)</label>
      <input
        id="whatsapp"
        class="input"
        name="whatsapp"
        placeholder="4791234567"
        required
        inputmode="numeric"
        autocomplete="tel"
        maxlength="10"
        pattern="^\d{10}$"
        title="Debe tener exactamente 10 dígitos"
      >
      <div id="waErr" class="muted" style="margin-top:6px; color:#ff6b6b; display:none;">
        WhatsApp inválido: deben ser exactamente 10 dígitos.
      </div>
    </div>

    <div>
      <label class="muted">Tipo</label>
      <select class="input" name="vtype">
        <option value="auto">Auto</option>
        <option value="camioneta">Camioneta</option>
        <option value="moto">Moto</option>
      </select>
    </div>

    <div>
      <label class="muted">Placas</label>
      <input class="input" name="plate" placeholder="ABC-123">
    </div>

    <div>
      <label class="muted">Alias (opcional)</label>
      <input class="input" name="alias" placeholder="Type R / La troca / etc">
    </div>

    <div>
      <label class="muted">Marca</label>
      <input class="input" name="make" placeholder="Honda">
    </div>

    <div>
      <label class="muted">Modelo</label>
      <input class="input" name="model" placeholder="Civic">
    </div>

    <div>
      <label class="muted">Color</label>
      <input class="input" name="color" placeholder="Rojo">
    </div>

    <div>
      <label class="muted">Paquete</label>
      <select class="input" name="package">
        {% for p in packages %}
          <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="muted">Pago</label>
      <select class="input" name="pay_method">
        <option value="efectivo">Efectivo</option>
        <option value="transferencia">Transferencia</option>
        <option value="tarjeta">Tarjeta</option>
      </select>
    </div>
  </div>

  <div class="row" style="justify-content:flex-end; margin-top:12px;">
    <button class="btn" type="submit">Crear orden</button>
  </div>
</form>

<script>
  function digitsOnly(raw) {
    return String(raw || "").replace(/\D+/g, "");
  }

  function normalizeToMx10(raw) {
    const d = digitsOnly(raw);
    if (!d) return "";
    if (d.length > 10) return d.slice(-10);
    if (d.length === 10) return d;
    return "";
  }

  const wa = document.getElementById("whatsapp");
  const err = document.getElementById("waErr");

  wa.addEventListener("input", () => {
    // solo números, máximo 10
    let d = digitsOnly(wa.value);
    if (d.length > 10) d = d.slice(-10);
    wa.value = d;
    err.style.display = "none";
  });

  wa.addEventListener("blur", () => {
    const fixed = normalizeToMx10(wa.value);
    if (fixed) wa.value = fixed;
  });

  function validateWhatsApp10() {
    const fixed = normalizeToMx10(wa.value);
    if (!fixed) {
      err.style.display = "block";
      wa.focus();
      return false;
    }
    wa.value = fixed;
    err.style.display = "none";
    return true;
  }
</script>

{% endblock %}
